<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mohammad Usman - Computer Education</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .excel-files{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-top:10px;
    }

    .excel-files a{
      text-decoration:none;
    }

    .excel-files button{
      width:100%;
      padding:8px;
      border:none;
      border-radius:5px;
      background:#198754;
      color:#fff;
      cursor:pointer;
      font-size:14px;
    }

    .excel-files button:hover{
      background:#146c43;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">MOHAMMAD USMAN</div>

    <nav>
      <a href="#">Home</a>
      <a href="#courses">Courses</a>
      <a href="#login">Student Login</a>

  </header>

  <section class="hero">
    <div class="hero-text">
      <h1>MOHAMMAD USMAN</h1>
      <p>Computer Teacher | Trainer | Mentor</p>
    </div>

    <img src="image/usman.jpg.jpeg" alt="Mohammad Usman">
  </section>

  <section class="courses" id="courses">
    <h2>Our Popular Courses</h2>

    <div class="grid">

      <!-- MS Word -->
      <div class="card">
        <img src="image/word.png" alt="MS Word">
        <h3>MS Word</h3>
        <button>View Course</button>
      </div>

      <!-- MS Excel -->
      <div class="card">
        <img src="image/excel.png" alt="MS Excel">
        <h3>MS Excel</h3>

        <div class="excel-files">

          <a href="excel/3-Sort-Option-in-Excel.xlsx" download>
            <button>Sort Option</button>
          </a>

          <a href="excel/6-Data-Validation-in-Excel.xlsx" download>
            <button>Data Validation</button>
          </a>

          <a href="excel/7-Conditional-Formatting-in-Excel.xlsx" download>
            <button>Conditional Formatting</button>
          </a>

          <a href="excel/8-VLOOKUP-in-Excel.xlsx" download>
            <button>VLOOKUP</button>
          </a>

          <a href="excel/9-Pivot-Table.xlsx" download>
            <button>Pivot Table</button>
          </a>

          <a href="excel/10-Charts-in-Excel.xlsx" download>
            <button>Charts in Excel</button>
          </a>

        </div>
      </div>

      <!-- PowerPoint -->
      <div class="card">
        <img src="image/powerpoint.png" alt="MS PowerPoint">
        <h3>MS PowerPoint</h3>
        <button>View Course</button>
      </div>

      <!-- Photoshop -->
      <div class="card">
        <img src="image/photoshop.png" alt="Photoshop">
        <h3>Photoshop</h3>
        <button>View Course</button>
      </div>

    </div>
  </section>

  <section class="login-box" id="login">
    <h2>Student Login</h2>

  </section>

    © 2026 Mohammad Usman | Computer Education
  </footer>

    const firebaseConfig = {

      authDomain: "usman-60738.firebaseapp.com",
      projectId: "usman-60738",
      storageBucket: "usman-60738.firebasestorage.app",
      messagingSenderId: "668675134936",
      appId: "1:668675134936:web:9e37861d957c3a35a5cead"
